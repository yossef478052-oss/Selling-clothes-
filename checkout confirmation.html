<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Confirmed — LOGO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<style>
  .confirm-wrap { max-width: 640px; margin: 0 auto; padding: var(--sp-24) var(--sp-6) var(--sp-24); text-align: center; }
  .confirm-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--sp-6); font-size: 1.6rem; color: var(--gold); }
  .confirm-order-num { font-family: var(--font-mono); font-size: 1.1rem; color: var(--gold); margin: var(--sp-4) 0 var(--sp-8); padding: 14px 22px; border: 1px solid var(--hairline); border-radius: var(--radius-sm); display: inline-block; }
  .confirm-summary { text-align: left; border: 1px solid var(--hairline); border-radius: var(--radius-md); padding: var(--sp-6); margin: var(--sp-8) 0; background: var(--surface); }
  .confirm-item { display: flex; justify-content: space-between; font-size: 0.84rem; padding: var(--sp-2) 0; color: var(--text-dim); }
  .confirm-item span:first-child { color: var(--text); }
  .confirm-total { display: flex; justify-content: space-between; border-top: 1px solid var(--hairline); margin-top: var(--sp-3); padding-top: var(--sp-3); font-weight: 600; }
  .confirm-total .val { color: var(--gold); font-family: var(--font-mono); }
  .confirm-actions { display: flex; gap: var(--sp-3); justify-content: center; margin-top: var(--sp-8); flex-wrap: wrap; }
</style>
</head>
<body>
<div id="h-nav-mount"></div>

<div class="confirm-wrap">
  <div class="confirm-icon">✓</div>
  <p class="eyebrow">Thank you</p>
  <h1 class="h-display-lg">Order Confirmed</h1>
  <p class="text-dim" style="margin-top:var(--sp-3);">We've received your order and will begin preparing it shortly. A confirmation has been sent to your email.</p>

  <div class="confirm-order-num" id="order-num-display">Order #—</div>

  <div class="confirm-summary" id="confirm-summary"></div>

  <div class="confirm-actions">
    <a href="shop.html" class="btn btn-gold">Continue shopping</a>
    <a href="index.html" class="btn btn-line">Back to home</a>
  </div>
</div>

<div id="h-footer-mount"></div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script>
  hMountLayout();
  const orderNumber = new URLSearchParams(window.location.search).get('order') || sessionStorage.getItem('hassan_last_order');
  document.getElementById('order-num-display').textContent = orderNumber ? `Order #${orderNumber}` : 'Order confirmed';

  const orders = HStore.getOrders();
  const order = orders.find(o => o.orderNumber === orderNumber);
  if (order){
    document.getElementById('confirm-summary').innerHTML = `
      ${order.items.map(i => `<div class="confirm-item"><span>${i.name} · ${i.color}, ${i.size} × ${i.qty}</span><span>${hPrice(i.price * i.qty)}</span></div>`).join('')}
      <div class="confirm-total"><span>Total paid</span><span class="val">${hPrice(order.total)}</span></div>
    `;
  } else {
    document.getElementById('confirm-summary').innerHTML = `<p class="text-dim">Order details are unavailable for this session.</p>`;
  }
  
</script>
</body>
</html>
